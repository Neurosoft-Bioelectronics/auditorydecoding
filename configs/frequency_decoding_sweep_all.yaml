preprocessing:
  window_length: 0.5
  bandpass_fs: 2000
  bandpass_order: 6
  zscore_before_pca: false
  whitening: true
  apply_pca: true
  n_components: null
  norm_by_channel: false

features:
  stft_log: true
  crop_freqs: true
  zscore_features: false
  std_normalize: false
  flatten: true

training:
  balance_classes: false
  balance_seed: 42
  logreg_max_iter: 10000

sweep:
  include_no_bandpass: true
  stft_modes: [true, false]
  lowcut:
    min: 0.1
    max: 50.0
    num: 10
  highcut:
    min: 5.0
    max: 500.0
    num: 10
  # Require highcut >= ratio * lowcut to avoid degenerate narrow bands
  min_bandwidth_ratio: 2.0
