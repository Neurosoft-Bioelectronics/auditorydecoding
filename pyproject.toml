[project]
name = "auditorydecoding"
version = "0.1.0"
description = "Auditory decoding of brain activity in different animals"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "brainsets",
    "torch-brain",
]

[tool.uv.sources]
brainsets = { git = "https://github.com/neuro-galaxy/brainsets.git", branch = "suarez/bids-utils" }

[dependency-groups]
dev = ["ruff>=0.15.4"]

[tool.ruff]
line-length = 80

[tool.ruff.lint.pydocstyle]
convention = "google"
